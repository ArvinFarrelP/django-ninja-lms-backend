services:
  db:
    image: postgres:15
    container_name: lms_db
    restart: always
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lmsuser
      POSTGRES_PASSWORD: lmspass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: lms_redis
    restart: always

  mongodb:
    image: mongo:7
    container_name: lms_mongodb
    restart: always
    ports:
      - "27017:27017"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: lms_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  web:
    build: .
    container_name: lms_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mongodb
      - rabbitmq
    environment:
      DB_NAME: lms
      DB_USER: lmsuser
      DB_PASSWORD: lmspass
      DB_HOST: db
      DB_PORT: 5432

  celery-worker:
    build: .
    container_name: lms_celery_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
      - redis

  celery-beat:
    build: .
    container_name: lms_celery_beat
    command: celery -A config beat -l info
    volumes:
      - .:/app
    depends_on:
      - rabbitmq
      - redis

  flower:
    build: .
    container_name: lms_flower
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
      - redis

volumes:
  postgres_data: